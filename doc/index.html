<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>Fight - 官方使用指南</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;500;800&family=Noto+Sans+SC:wght@300;500;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        :root {
            --primary: #00d2ff;
            --secondary: #3a7bd5;
            --bg-color: #07090d;
            --card-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
            --text-main: #ffffff;
            --text-dim: rgba(255, 255, 255, 0.6);
            --ease-out-expo: cubic-bezier(0.19, 1, 0.22, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Plus Jakarta Sans', 'Noto Sans SC', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            min-height: 100vh;
            line-height: 1.7;
            overflow-x: hidden;
        }

        /* 统一背景层 */
        .bg-layer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background: 
                radial-gradient(circle at 10% 20%, rgba(0, 210, 255, 0.05) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(58, 123, 213, 0.05) 0%, transparent 40%);
        }

        .grid-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background-image: 
                linear-gradient(rgba(255, 255, 255, 0.02) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.02) 1px, transparent 1px);
            background-size: 40px 40px;
            mask-image: radial-gradient(ellipse at center, black, transparent 90%);
        }

        #particles-js {
            position: fixed;
            width: 100%;
            height: 100%;
            z-index: -1;
        }

        /* 顶部导航 */
        nav {
            position: sticky;
            top: 0;
            width: 100%;
            padding: 20px 40px;
            z-index: 100;
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--glass-border);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .back-link {
            text-decoration: none;
            color: var(--text-dim);
            font-size: 14px;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: 0.3s;
        }

        .back-link:hover {
            color: var(--primary);
            transform: translateX(-5px);
        }

        .nav-logo {
            font-weight: 900;
            letter-spacing: 2px;
            color: #fff;
            text-transform: uppercase;
            font-size: 18px;
        }

        /* 文档主体容器 */
        .doc-wrapper {
            max-width: 1000px;
            margin: 60px auto;
            padding: 0 24px 100px;
        }

        .doc-card {
            background: var(--card-bg);
            border: 1px solid var(--glass-border);
            border-radius: 32px;
            padding: 60px;
            backdrop-filter: blur(40px);
            box-shadow: 0 40px 100px rgba(0, 0, 0, 0.5);
            animation: cardFadeIn 0.8s var(--ease-out-expo);
        }

        @keyframes cardFadeIn {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Markdown 内容样式自定义 */
        #content {
            font-weight: 300;
            color: rgba(255,255,255,0.9);
        }

        #content h1 {
            font-size: 42px;
            font-weight: 900;
            margin-bottom: 40px;
            background: linear-gradient(to right, #fff, var(--primary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            border-bottom: 1px solid var(--glass-border);
            padding-bottom: 20px;
        }

        #content h2 {
            font-size: 28px;
            margin: 45px 0 20px;
            color: var(--primary);
            display: flex;
            align-items: center;
            gap: 12px;
        }

        #content h2::before {
            content: '';
            width: 4px;
            height: 24px;
            background: var(--primary);
            border-radius: 10px;
        }

        #content h3 {
            font-size: 20px;
            margin: 30px 0 15px;
            font-weight: 600;
        }

        #content p {
            margin-bottom: 20px;
            color: var(--text-dim);
        }

        #content code {
            font-family: 'Consolas', monospace;
            background: rgba(0, 210, 255, 0.1);
            color: var(--primary);
            padding: 3px 8px;
            border-radius: 6px;
            font-size: 0.9em;
        }

        #content pre {
            background: rgba(0, 0, 0, 0.3);
            padding: 24px;
            border-radius: 16px;
            border: 1px solid var(--glass-border);
            overflow-x: auto;
            margin: 25px 0;
        }

        #content pre code {
            background: none;
            padding: 0;
            color: #eee;
        }

        #content blockquote {
            border-left: 4px solid var(--primary);
            background: rgba(255, 255, 255, 0.02);
            padding: 20px 30px;
            margin: 30px 0;
            border-radius: 0 16px 16px 0;
            font-style: italic;
            color: var(--text-dim);
        }

        #content ul, #content ol {
            margin: 20px 0 20px 25px;
            color: var(--text-dim);
        }

        #content li {
            margin-bottom: 10px;
        }

        #content img {
            max-width: 100%;
            border-radius: 16px;
            border: 1px solid var(--glass-border);
            margin: 20px 0;
        }

        #content table {
            width: 100%;
            border-collapse: collapse;
            margin: 30px 0;
        }

        #content th {
            text-align: left;
            background: rgba(255,255,255,0.05);
            padding: 15px;
            border: 1px solid var(--glass-border);
        }

        #content td {
            padding: 15px;
            border: 1px solid var(--glass-border);
        }

        /* 加载动画 */
        .loading {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 100px 0;
            color: var(--text-dim);
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(0, 210, 255, 0.1);
            border-top: 3px solid var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }

        @keyframes spin { 100% { transform: rotate(360deg); } }

        @media (max-width: 768px) {
            .doc-card { padding: 30px 20px; border-radius: 20px; }
            #content h1 { font-size: 28px; }
            nav { padding: 15px 20px; }
        }
    </style>
</head>
<body>

    <div class="bg-layer"></div>
    <div class="grid-overlay"></div>
    <div id="particles-js"></div>

    <nav>
        <a href="index.html" class="back-link">
            <i class="fa-solid fa-arrow-left"></i> 返回官网
        </a>
        <div class="nav-logo">Fight Doc</div>
        <div style="width: 80px;"></div> <!-- 占位平衡 -->
    </nav>

    <div class="doc-wrapper">
        <div class="doc-card">
            <div id="content">
                <div class="loading">
                    <div class="spinner"></div>
                    <p>正在同步云端文档...</p>
                </div>
            </div>
        </div>
    </div>

    <!-- 脚本部分 -->
    <script src="https://cdn.jsdelivr.net/npm/particles.js@2.0.0/particles.min.js"></script>
    <script>
        // 初始化背景粒子
        particlesJS('particles-js', {
            "particles": {
                "number": { "value": 40, "density": { "enable": true, "value_area": 800 } },
                "color": { "value": "#00d2ff" },
                "opacity": { "value": 0.1, "random": true },
                "size": { "value": 1, "random": true },
                "line_linked": { "enable": true, "distance": 150, "color": "#00d2ff", "opacity": 0.05, "width": 1 },
                "move": { "enable": true, "speed": 0.4, "direction": "top", "out_mode": "out" }
            }
        });

        // 加载 Markdown 逻辑
        async function loadMarkdown() {
            const contentEl = document.getElementById('content');
            try {
                // 如果本地没有 README.md，这里会触发 catch 显示错误
                const response = await fetch('README.md');
                if (!response.ok) throw new Error('File not found');
                
                const text = await response.text();
                
                // 配置 Marked 选项
                marked.setOptions({
                    breaks: true,
                    gfm: true
                });

                // 渲染内容并添加渐现动画
                contentEl.style.opacity = '0';
                setTimeout(() => {
                    contentEl.innerHTML = marked.parse(text);
                    contentEl.style.transition = 'opacity 0.5s ease';
                    contentEl.style.opacity = '1';
                }, 300);

            } catch (err) {
                contentEl.innerHTML = `
                    <div style="text-align: center; padding: 40px;">
                        <i class="fa-solid fa-triangle-exclamation" style="font-size: 48px; color: #ff4e50; margin-bottom: 20px;"></i>
                        <h2 style="color: #fff; margin-bottom: 10px;">文档加载失败</h2>
                        <p>未能在服务器根目录找到 <code>README.md</code> 文件。</p>
                        <a href="index.html" class="back-link" style="justify-content: center; margin-top: 20px; color: var(--primary);">返回主页</a>
                    </div>
                `;
            }
        }

        window.onload = loadMarkdown;
    </script>
</body>
</html>
