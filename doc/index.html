<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>Fight - 官方使用教程</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        :root {
            --primary: #00d2ff;
            --bg: #07090d;
            --card: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.1);
        }
        body {
            background: var(--bg);
            color: #fff;
            font-family: 'PingFang SC', sans-serif;
            line-height: 1.8;
            margin: 0;
            padding: 0;
        }
        .container {
            max-width: 800px;
            margin: 60px auto;
            padding: 40px;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 24px;
            backdrop-filter: blur(20px);
        }
        /* Markdown 样式美化 */
        #content h1 { color: var(--primary); border-bottom: 1px solid var(--border); padding-bottom: 10px; }
        #content h3 { margin-top: 30px; color: #eee; }
        #content code { background: rgba(0,210,255,0.1); padding: 2px 6px; border-radius: 4px; color: var(--primary); }
        #content blockquote { border-left: 4px solid var(--primary); margin: 20px 0; padding-left: 20px; color: #888; }
        .back-btn {
            display: inline-block;
            margin-bottom: 20px;
            color: var(--primary);
            text-decoration: none;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="container">
        <a href="../index.html" class="back-btn"><i class="fa-solid fa-arrow-left"></i> 返回官网</a>
        <div id="content">正在加载教程...</div>
    </div>

    <script>
        // 读取本地或远程的 md 文件
        fetch('tutorial.md')
            .then(response => response.text())
            .then(text => {
                document.getElementById('content').innerHTML = marked.parse(text);
            })
            .catch(err => {
                document.getElementById('content').innerHTML = "教程加载失败，请检查 tutorial.md 是否存在。";
            });
    </script>
</body>
</html>
