<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fight - 释放您的枪灵</title>
    <!-- 引入 FontAwesome 6 增强图标 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #8ecae6;
            --secondary: #ffb7b2;
            --accent: #b2fef7;
            --buy-grad: linear-gradient(135deg, #ff9a9e 0%, #fecfef 100%);
            --dl-grad: linear-gradient(135deg, #a1c4fd 0%, #c2e9fb 100%);
            --text-main: #34495e;
            --text-light: #95a5a6;
            --glass: rgba(255, 255, 255, 0.4);
            --glass-border: rgba(255, 255, 255, 0.5);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', 'PingFang SC', 'Hiragino Sans GB', sans-serif;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow-x: hidden;
            background-color: #f0f4f8;
            /* 动态流体背景效果 */
            background-image: 
                radial-gradient(at 0% 0%, hsla(199, 98%, 89%, 1) 0, transparent 50%), 
                radial-gradient(at 50% 0%, hsla(3, 100%, 93%, 1) 0, transparent 50%), 
                radial-gradient(at 100% 0%, hsla(180, 100%, 91%, 1) 0, transparent 50%), 
                radial-gradient(at 50% 100%, hsla(220, 100%, 95%, 1) 0, transparent 50%);
            background-size: 200% 200%;
            animation: fluidBg 15s ease infinite;
        }

        @keyframes fluidBg {
            0% { background-position: 0% 0%; }
            50% { background-position: 100% 100%; }
            100% { background-position: 0% 0%; }
        }

        #particles-js {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            z-index: 1;
            pointer-events: none;
        }

        .wrapper {
            position: relative;
            z-index: 10;
            width: 90%;
            max-width: 1100px;
            padding: 40px 0;
            animation: fadeInUp 1s ease-out;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* 标题区设计 */
        .hero-section {
            text-align: center;
            margin-bottom: 70px;
        }

        .hero-section .badge {
            background: rgba(255, 255, 255, 0.6);
            padding: 6px 20px;
            border-radius: 30px;
            font-size: 13px;
            color: var(--text-light);
            letter-spacing: 3px;
            border: 1px solid var(--glass-border);
            display: inline-block;
            margin-bottom: 20px;
            backdrop-filter: blur(5px);
        }

        .hero-section h1 {
            font-size: clamp(48px, 8vw, 86px);
            font-weight: 900;
            background: linear-gradient(to right, #89f7fe 0%, #66a6ff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 10px 15px rgba(102, 166, 255, 0.2));
            letter-spacing: -2px;
            margin-bottom: 10px;
        }

        .hero-section p {
            font-size: 20px;
            color: var(--text-main);
            font-weight: 300;
            letter-spacing: 6px;
            opacity: 0.8;
        }

        /* 卡片阵列布局 */
        .features-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 30px;
            margin-bottom: 80px;
        }

        .feature-card {
            background: var(--glass);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid var(--glass-border);
            border-radius: 32px;
            padding: 50px 30px;
            text-align: center;
            transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1);
            position: relative;
            overflow: hidden;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.03);
        }

        /* 悬浮时的光泽流转效果 */
        .feature-card::after {
            content: '';
            position: absolute;
            top: -100%;
            left: -100%;
            width: 300%;
            height: 300%;
            background: radial-gradient(circle, rgba(255,255,255,0.4) 0%, transparent 60%);
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
        }

        .feature-card:hover::after {
            opacity: 1;
        }

        .feature-card:hover {
            transform: translateY(-15px) scale(1.02);
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.06);
            background: rgba(255, 255, 255, 0.55);
        }

        .icon-wrapper {
            width: 80px;
            height: 80px;
            background: white;
            border-radius: 22px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 30px;
            font-size: 32px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.05);
            transition: 0.5s ease;
        }

        .feature-card:hover .icon-wrapper {
            transform: rotateY(180deg);
        }

        .feature-card h3 {
            font-size: 24px;
            color: var(--text-main);
            margin-bottom: 15px;
            font-weight: 700;
        }

        .feature-card p {
            font-size: 15px;
            color: var(--text-light);
            line-height: 1.8;
        }

        /* 按钮组 */
        .cta-group {
            display: flex;
            justify-content: center;
            gap: 25px;
            flex-wrap: wrap;
        }

        .btn {
            position: relative;
            padding: 22px 50px;
            border-radius: 24px;
            text-decoration: none;
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: all 0.3s ease;
            min-width: 280px;
            border: 1px solid rgba(255,255,255,0.8);
            backdrop-filter: blur(10px);
        }

        .btn i { font-size: 24px; margin-bottom: 8px; }

        .btn-download {
            background: var(--dl-grad);
            color: #4a6fa5;
            box-shadow: 0 10px 30px rgba(161, 196, 253, 0.3);
        }

        .btn-buy {
            background: var(--buy-grad);
            color: #c0392b;
            box-shadow: 0 10px 30px rgba(255, 154, 158, 0.3);
            animation: pulse-red 2s infinite;
        }

        @keyframes pulse-red {
            0% { box-shadow: 0 0 0 0 rgba(255, 154, 158, 0.4); }
            70% { box-shadow: 0 0 0 20px rgba(255, 154, 158, 0); }
            100% { box-shadow: 0 0 0 0 rgba(255, 154, 158, 0); }
        }

        .btn:hover {
            transform: translateY(-8px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            filter: brightness(1.05);
        }

        .btn-text { font-size: 20px; font-weight: 800; letter-spacing: 1px; }
        .btn-desc { font-size: 12px; opacity: 0.7; margin-top: 4px; }

        /* 底部版权信息 */
        footer {
            margin-top: 60px;
            text-align: center;
            font-size: 13px;
            color: var(--text-light);
            letter-spacing: 1px;
        }

        /* 移动端优化 */
        @media (max-width: 992px) {
            .features-grid { grid-template-columns: 1fr; gap: 20px; }
            .hero-section h1 { font-size: 52px; }
            .wrapper { padding: 40px 20px; }
        }
    </style>
</head>
<body>

    <!-- 粒子装饰背景 -->
    <div id="particles-js"></div>

    <div class="wrapper">
        <!-- 头部展示 -->
        <section class="hero-section">
            <div class="badge">Fuck Everyone</div>
            <h1>Fight</h1>
            <p>释放您的枪灵 · 颠覆视界</p>
        </section>

        <!-- 功能展示区 -->
        <section class="features-grid">
            <div class="feature-card">
                <div class="icon-wrapper" style="color: #48cae4;">
                    <i class="fa-solid fa-wand-magic-sparkles"></i>
                </div>
                <h3>炫酷视觉</h3>
                <p>沉浸式 UI 交互设计<br>动态色彩映射技术<br>每一帧都是极致享受</p>
            </div>

            <div class="feature-card">
                <div class="icon-wrapper" style="color: #ff8fa3;">
                    <i class="fa-solid fa-microchip"></i>
                </div>
                <h3>独家黑科技</h3>
                <p>毫秒级自动交互系统<br>静默算法深度优化<br>多维实体追踪技术</p>
            </div>

            <div class="feature-card">
                <div class="icon-wrapper" style="color: #52b788;">
                    <i class="fa-solid fa-shield-virus"></i>
                </div>
                <h3>纯净安全</h3>
                <p>多重加密防护体系<br>无后门、无广告注入<br>为您提供最稳健的环境</p>
            </div>
        </section>

        <!-- 按钮动作区 -->
        <section class="cta-group">
            <a href="https://www.123912.com/s/N3EGTd-XYEpH" class="btn btn-download" target="_blank">
                <i class="fa-solid fa-circle-arrow-down"></i>
                <span class="btn-text">立即获取 Fight</span>
                <span class="btn-desc">版本 V1.1 | 全球节点加速</span>
            </a>

            <a href="https://iloli.asia" class="btn btn-buy" target="_blank">
                <i class="fa-solid fa-credit-card"></i>
                <span class="btn-text">进入卡网购买</span>
                <span class="btn-desc">7×24小时自动发卡 · 售后保障</span>
            </a>
        </section>

        <footer>
            &copy; 2026 Fight. 版权所有
        </footer>
    </div>

    <!-- 脚本逻辑 -->
    <script src="https://cdn.jsdelivr.net/npm/particles.js@2.0.0/particles.min.js"></script>
    <script>
        // 粒子背景初始化
        particlesJS('particles-js', {
            "particles": {
                "number": { "value": 40, "density": { "enable": true, "value_area": 800 } },
                "color": { "value": "#ffffff" },
                "shape": { "type": "circle" },
                "opacity": { "value": 0.3, "random": true },
                "size": { "value": 4, "random": true },
                "move": { "enable": true, "speed": 1.2, "direction": "top-right", "random": true, "straight": false, "out_mode": "out" }
            },
            "interactivity": {
                "detect_on": "canvas",
                "events": { "onhover": { "enable": true, "mode": "bubble" } },
                "modes": { "bubble": { "distance": 200, "size": 6, "duration": 2, "opacity": 0.6, "speed": 3 } }
            }
        });

        // 卡片鼠标跟随光泽效果
        document.querySelectorAll('.feature-card').forEach(card => {
            card.addEventListener('mousemove', e => {
                const rect = card.getBoundingClientRect();
                const x = ((e.clientX - rect.left) / rect.width) * 100;
                const y = ((e.clientY - rect.top) / rect.height) * 100;
                card.style.setProperty('--mouse-x', `${x}%`);
                card.style.setProperty('--mouse-y', `${y}%`);
                
                // 3D 旋转效果
                const rotateX = (e.clientY - rect.top - rect.height / 2) / 15;
                const rotateY = (rect.width / 2 - (e.clientX - rect.left)) / 15;
                card.style.transform = `perspective(1000px) rotateX(${rotateX}deg) rotateY(${rotateY}deg) translateY(-10px)`;
            });

            card.addEventListener('mouseleave', () => {
                card.style.transform = `perspective(1000px) rotateX(0deg) rotateY(0deg) translateY(0)`;
            });
        });
    </script>
</body>
</html>
