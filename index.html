<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <link rel="icon" type="image/png" href="image/Fight.png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Fight | 官方下载平台</title>
    <!-- 引入外部资源 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;500;800&family=Noto+Sans+SC:wght@300;500;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #00d2ff;
            --secondary: #3a7bd5;
            --accent-red: #ff4e50;
            --accent-orange: #f9d423;
            --bg-color: #07090d;
            --card-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.1);
            --text-main: #ffffff;
            --text-dim: rgba(255, 255, 255, 0.6);
            --ease-out-expo: cubic-bezier(0.19, 1, 0.22, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Plus Jakarta Sans', 'Noto Sans SC', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            overflow: hidden; /* 禁止全局滚动，由内部容器处理 */
            height: 100vh;
            width: 100vw;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* 极客感背景层 */
        .bg-layer {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            background: 
                radial-gradient(circle at 10% 20%, rgba(0, 210, 255, 0.08) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(58, 123, 213, 0.08) 0%, transparent 40%);
        }

        .grid-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            background-image: 
                linear-gradient(rgba(255, 255, 255, 0.02) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.02) 1px, transparent 1px);
            background-size: 40px 40px;
            mask-image: radial-gradient(ellipse at center, black, transparent 90%);
        }

        #particles-js {
            position: fixed;
            width: 100%; height: 100%;
            z-index: -1;
        }

        /* 页面通用布局 - 优化为视口居中 */
        .page {
            width: 100%;
            height: 100%;
            display: none;
            opacity: 0;
            transform: scale(1.05);
            transition: all 0.8s var(--ease-out-expo);
            position: relative;
            z-index: 10;
        }

        .page.active {
            display: flex;
            flex-direction: column;
            justify-content: center; /* 垂直居中 */
            align-items: center;
            opacity: 1;
            transform: scale(1);
        }

        /* 主容器，限制最大宽度和高度比例 */
        .wrapper {
            padding: 20px;
            width: 100%;
            max-width: 1200px;
            max-height: 900px; /* 16:9 比例下的理想高度 */
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        /* 头部设计 - 压缩间距以适应 16:9 */
        .hero-section {
            text-align: center;
            margin-bottom: 2vh;
        }

        .hero-badge {
            display: inline-block;
            padding: 4px 16px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--glass-border);
            border-radius: 100px;
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 2px;
            color: var(--primary);
            margin-bottom: 15px;
            backdrop-filter: blur(5px);
            text-transform: uppercase;
        }

        .hero-section h1 {
            font-size: clamp(48px, 10vh, 100px);
            font-weight: 900;
            line-height: 1.5; 
            margin-bottom: 10px;
            background: linear-gradient(to bottom, #fff 50%, rgba(255,255,255,0.3));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -2px;
        }

        .hero-section p {
            font-size: clamp(14px, 2vh, 18px);
            color: var(--text-dim);
            letter-spacing: 8px;
            font-weight: 300;
            text-transform: uppercase;
        }

        /* 网格卡片 - 调整为更紧凑的比例 */
        .features-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin: 4vh 0;
            width: 100%;
        }

        .feature-card {
            background: var(--card-bg);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 30px 25px;
            transition: all 0.5s var(--ease-out-expo);
            backdrop-filter: blur(20px);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }

        .feature-card:hover {
            border-color: rgba(0, 210, 255, 0.4);
            background: rgba(255, 255, 255, 0.06);
            transform: translateY(-5px);
            box-shadow: 0 20px 40px -10px rgba(0,0,0,0.5);
        }

        .icon-box {
            width: 50px;
            height: 50px;
            background: rgba(255,255,255,0.03);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            margin-bottom: 20px;
            color: var(--primary);
            border: 1px solid var(--glass-border);
            transition: all 0.5s var(--ease-out-expo);
        }

        .feature-card:hover .icon-box {
            color: #fff;
            background: var(--primary);
            box-shadow: 0 0 20px rgba(0, 210, 255, 0.4);
            transform: scale(1.1);
        }

        .feature-card h3 {
            font-size: clamp(18px, 2.2vh, 22px);
            margin-bottom: 12px;
            font-weight: 800;
        }

        .feature-card p {
            font-size: clamp(13px, 1.6vh, 15px);
            color: var(--text-dim);
            line-height: 1.6;
            font-weight: 300;
        }

        /* 交互按钮 */
        .cta-container {
            display: flex;
            justify-content: center;
            gap: 15px;
            width: 100%;
        }

        .btn {
            position: relative;
            padding: 16px 24px;
            border-radius: 20px;
            text-decoration: none;
            color: white;
            font-weight: 800;
            display: flex;
            align-items: center;
            gap: 15px;
            transition: all 0.4s var(--ease-out-expo);
            border: 1px solid var(--glass-border);
            cursor: pointer;
            background: rgba(255,255,255,0.02);
            flex: 1;
            max-width: 300px;
        }

        .btn-main { background: #fff; color: #000; border: none; }
        .btn-buy { background: linear-gradient(135deg, #ff4e50, #f9d423); color: #fff; border: none; }
        .btn-doc { background: rgba(255,255,255,0.05); color: #fff; }

        .btn:hover {
            transform: translateY(-4px);
            box-shadow: 0 15px 30px rgba(0,0,0,0.3);
        }

        .btn-main:hover { background: #f0f0f0; }

        .btn i { font-size: 20px; }

        .btn-content { display: flex; flex-direction: column; text-align: left; }
        .btn-title { display: block; font-size: 15px; }
        .btn-sub { display: block; font-size: 9px; opacity: 0.6; letter-spacing: 1px; }

        /* 底部 */
        footer {
            margin-top: 3vh;
            color: var(--text-dim);
            font-size: 9px;
            letter-spacing: 4px;
            opacity: 0.5;
            text-align: center;
            text-transform: uppercase;
        }

        /* 倒计时页优化 */
        .redirect-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
        }

        .countdown-container {
            position: relative;
            width: 140px; height: 140px;
            margin-bottom: 30px;
        }

        .countdown-svg { transform: rotate(-90deg); width: 140px; height: 140px; }
        .countdown-bg { fill: none; stroke: rgba(255,255,255,0.05); stroke-width: 4; }
        .countdown-progress {
            fill: none; stroke: var(--primary); stroke-width: 4;
            stroke-dasharray: 440; /* 2 * PI * 70 */
            stroke-dashoffset: 0;
            stroke-linecap: round;
            transition: stroke-dashoffset 1s linear;
        }

        .timer-val {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            font-size: 48px;
            font-weight: 900;
        }

        /* 手机端适配 */
        @media (max-width: 768px) {
            body { overflow-y: auto; height: auto; min-height: 100vh; }
            .page.active { justify-content: flex-start; padding-top: 40px; }
            .wrapper { max-height: none; }
            .hero-section h1 { font-size: 60px; }
            .features-grid { grid-template-columns: 1fr; gap: 15px; margin: 30px 0; }
            .cta-container { flex-direction: column; align-items: center; }
            .btn { max-width: 100%; width: 100%; }
            .feature-card { padding: 25px; }
            footer { margin-bottom: 40px; }
        }

        /* 短屏幕（如 16:9 笔记本）适配 */
        @media (max-height: 700px) and (min-width: 769px) {
            .wrapper { padding: 10px 20px; }
            .features-grid { margin: 15px 0; gap: 15px; }
            .feature-card { padding: 15px 20px; }
            .icon-box { margin-bottom: 10px; width: 40px; height: 40px; font-size: 16px; }
            .hero-section { margin-bottom: 10px; }
        }
    </style>
</head>
<body>

    <div class="bg-layer"></div>
    <div class="grid-overlay"></div>
    <div id="particles-js"></div>

    <!-- 首页 -->
    <div id="page-home" class="page active">
        <div class="wrapper">
            <header class="hero-section">
                <span class="hero-badge">FUCK EVERYONE System</span>
                <h1>Fight</h1>
                <p>释放您的枪灵 · 颠覆视界</p>
            </header>

            <main class="features-grid">
                <div class="feature-card">
                    <div class="icon-box"><i class="fa-solid fa-eye"></i></div>
                    <h3>极致视觉</h3>
                    <p>原生引擎驱动的超低延迟渲染，为您呈现细腻丝滑的动态效果，不仅是工具，更是视觉艺术品。</p>
                </div>

                <div class="feature-card">
                    <div class="icon-box"><i class="fa-solid fa-brain"></i></div>
                    <h3>智能算法</h3>
                    <p>自研神经响应引擎，毫秒级多实体预测追踪。在极端环境下，也能保持绝对的稳定与精准。</p>
                </div>

                <div class="feature-card">
                    <div class="icon-box"><i class="fa-solid fa-ghost"></i></div>
                    <h3>静默护卫</h3>
                    <p>内核级碎片化加密。不占资源、不留痕迹，为您打造极致纯净且无法察觉的安全空间。</p>
                </div>
            </main>

            <section class="cta-container">
                <button class="btn btn-main" onclick="handleNavigation('https://www.123912.com/s/N3EGTd-XYEpH', '正在准备客户端资源...')">
                    <i class="fa-solid fa-cloud-arrow-down"></i>
                    <div class="btn-content">
                        <span class="btn-title">获取客户端</span>
                        <span class="btn-sub">V1.1 Stable</span>
                    </div>
                </button>

                <button class="btn btn-doc" onclick="handleNavigation('./doc', '正在加载文档...')">
                    <i class="fa-solid fa-book-open"></i>
                    <div class="btn-content">
                        <span class="btn-title">文档中心</span>
                        <span class="btn-sub">Tech Docs</span>
                    </div>
                </button>

                <button class="btn btn-buy" onclick="handleNavigation('https://buy.jry0.com/shop/Cat', '正在连接卡网中心...')">
                    <i class="fa-solid fa-credit-card"></i>
                    <div class="btn-content">
                        <span class="btn-title">进入卡网</span>
                        <span class="btn-sub">7 x 24h Delivery</span>
                    </div>
                </button>
            </section>

            <footer>&copy; 2026 FIGHT PROJECT. DEFINING THE FUTURE.</footer>
        </div>
    </div>

    <!-- 跳转容器 -->
    <div id="page-redirect" class="page">
        <div class="redirect-wrapper">
            <div class="countdown-container">
                <svg class="countdown-svg" width="140" height="140">
                    <circle class="countdown-bg" cx="70" cy="70" r="65" />
                    <circle id="progress-ring" class="countdown-progress" cx="70" cy="70" r="65" />
                </svg>
                <div id="timer-display" class="timer-val">3</div>
            </div>
            
            <h2 id="redirect-status" style="font-size: 28px; margin-bottom: 10px;">安全校验中</h2>
            <p style="color: var(--text-dim); margin-bottom: 30px;">少女祈祷中...</p>

            <div class="cta-container" style="justify-content: center;">
                <button class="btn btn-doc" style="max-width: 180px; justify-content: center;" id="manual-go">
                    <span class="btn-title">立即跳转</span>
                </button>
            </div>

            <button onclick="goBack()" style="background:none; border:none; color:var(--text-dim); margin-top:30px; cursor:pointer; text-decoration:underline;">
                取消并返回
            </button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/particles.js@2.0.0/particles.min.js"></script>
    <script>
        // 粒子背景初始化
        particlesJS('particles-js', {
            "particles": {
                "number": { "value": 40, "density": { "enable": true, "value_area": 800 } },
                "color": { "value": "#00d2ff" },
                "opacity": { "value": 0.15, "random": true },
                "size": { "value": 2, "random": true },
                "line_linked": { "enable": true, "distance": 150, "color": "#00d2ff", "opacity": 0.1, "width": 1 },
                "move": { "enable": true, "speed": 0.6, "direction": "top", "out_mode": "out" }
            },
            "interactivity": {
                "events": { "onhover": { "enable": true, "mode": "bubble" } },
                "modes": { "bubble": { "distance": 200, "size": 3, "duration": 2, "opacity": 0.3 } }
            }
        });

        let timerRef = null;
        let targetUrl = "";

        function handleNavigation(url, msg) {
            targetUrl = url;
            document.getElementById('redirect-status').innerText = msg;
            document.getElementById('manual-go').onclick = () => window.location.href = url;

            const home = document.getElementById('page-home');
            const redirect = document.getElementById('page-redirect');

            home.classList.remove('active');
            setTimeout(() => {
                home.style.display = 'none';
                redirect.style.display = 'flex';
                setTimeout(() => {
                    redirect.classList.add('active');
                    startCountdown();
                }, 50);
            }, 600);
        }

        function startCountdown() {
            let count = 3;
            const display = document.getElementById('timer-display');
            const ring = document.getElementById('progress-ring');
            const total = 408; // 2 * PI * 65

            display.innerText = count;
            ring.style.strokeDashoffset = 0;

            if(timerRef) clearInterval(timerRef);

            timerRef = setInterval(() => {
                count--;
                display.innerText = count >= 0 ? count : 0;
                let offset = total * (1 - Math.max(0, count) / 3);
                ring.style.strokeDashoffset = offset;

                if (count <= 0) {
                    clearInterval(timerRef);
                    setTimeout(() => { window.location.href = targetUrl; }, 400);
                }
            }, 1000);
        }

        function goBack() {
            clearInterval(timerRef);
            const home = document.getElementById('page-home');
            const redirect = document.getElementById('page-redirect');
            redirect.classList.remove('active');
            setTimeout(() => {
                redirect.style.display = 'none';
                home.style.display = 'flex';
                setTimeout(() => { home.classList.add('active'); }, 50);
            }, 600);
        }

        // 3D 悬浮效果
        document.querySelectorAll('.feature-card').forEach(card => {
            card.addEventListener('mousemove', e => {
                const rect = card.getBoundingClientRect();
                const centerX = rect.width / 2;
                const centerY = rect.height / 2;
                const rotateX = (e.clientY - rect.top - centerY) / 10;
                const rotateY = (centerX - (e.clientX - rect.left)) / 10;
                card.style.transform = `perspective(1000px) rotateX(${rotateX}deg) rotateY(${rotateY}deg) translateY(-5px)`;
            });
            card.addEventListener('mouseleave', () => {
                card.style.transform = `perspective(1000px) rotateX(0deg) rotateY(0deg) translateY(0)`;
            });
        });
    </script>
</body>
</html>
